<text class="title-text" x="48" y="98" font-family="'Fira Code', 'Courier New', monospace" font-size="32" font-weight="700" fill="#e8f4ff" letter-spacing="-0.5">Hola, soy César</text>
<text class="title-text cursor" x="360" y="98" font-family="'Fira Code', monospace" font-size="32" font-weight="700" fill="#00aaff">_</text>
<text class="sub-text" x="50" y="128" font-family="'Fira Code', 'Courier New', monospace" font-size="12" fill="#7ab8d4" letter-spacing="0.5">Ingeniería Informática + ADE  ·  ML · IA · Robótica · Espacio</text>
<line x1="48" y1="142" x2="340" y2="142" stroke="#1a6fa8" stroke-width="0.5" stroke-opacity="0.6"/>
<text class="sub-text" x="50" y="162" font-family="'Fira Code', monospace" font-size="11" fill="#4a8aaa" letter-spacing="1"><tspan>&gt; </tspan><tspan fill="#7ab8d4">building</tspan><tspan fill="#4a8aaa"> things that matter</tspan></text>
</svg>
