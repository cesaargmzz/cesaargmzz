<svg width="100%" viewBox="0 0 680 200" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Banner espacial animado para el perfil de César</title>
<desc>Escena espacial con estrellas parpadeantes, planeta y texto animado</desc>
<defs>
<radialGradient id="planet" cx="50%" cy="35%" r="60%">
<stop offset="0%" stop-color="#1a6fa8"/>
<stop offset="40%" stop-color="#0d4a7a"/>
<stop offset="100%" stop-color="#040e1a"/>
</radialGradient>
<radialGradient id="atmos" cx="50%" cy="50%" r="50%">
<stop offset="70%" stop-color="transparent"/>
<stop offset="100%" stop-color="#1a9fff" stop-opacity="0.35"/>
</radialGradient>
<radialGradient id="glow" cx="50%" cy="50%" r="50%">
<stop offset="0%" stop-color="#00aaff" stop-opacity="0.12"/>
<stop offset="100%" stop-color="transparent"/>
</radialGradient>
<clipPath id="clip-planet">
<circle cx="574" cy="110" r="62"/>
</clipPath>
<style>
.star { fill: #fff; }
@keyframes twinkle1 { 0%,100%{opacity:1} 50%{opacity:0.15} }
@keyframes twinkle2 { 0%,100%{opacity:0.6} 50%{opacity:1} }
@keyframes twinkle3 { 0%,100%{opacity:0.3} 50%{opacity:0.9} }
@keyframes orbit { from{transform-origin:574px 110px; transform:rotate(0deg)} to{transform-origin:574px 110px; transform:rotate(360deg)} }
@keyframes fadein { from{opacity:0;transform:translateX(-18px)} to{opacity:1;transform:translateX(0)} }
@keyframes fadeinsub { from{opacity:0;transform:translateX(-12px)} to{opacity:1;transform:translateX(0)} }
@keyframes pulse { 0%,100%{opacity:0.7} 50%{opacity:1} }
.s1 { animation: twinkle1 3.1s ease-in-out infinite; }
.s2 { animation: twinkle2 2.4s ease-in-out infinite; }
.s3 { animation: twinkle3 4.2s ease-in-out infinite; }
.s4 { animation: twinkle1 1.9s ease-in-out infinite; }
.s5 { animation: twinkle2 3.7s ease-in-out infinite; }
.orb { animation: orbit 18s linear infinite; }
.title-text { animation: fadein 1s ease-out both; }
.sub-text { animation: fadeinsub 1s ease-out 0.5s both; opacity:0; }
.cursor { animation: pulse 0.9s ease-in-out infinite; }
</style>
</defs>
